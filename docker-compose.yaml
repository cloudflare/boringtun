version: '3.8'

networks:
  vpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

services:
  boringtun:
    image: ghcr.io/cloudflare/boringtun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn-net:
        ipv4_address: 172.28.1.1
    ports:
      - "443:443/udp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.core.rmem_max=212992
      - net.core.wmem_max=212992
    volumes:
      - ./ssl/config:/config
    environment:
      - WG_LOG_LEVEL=info
      - WG_THREADS=2
    command: ["wg0", "-f", "/config/wg_confs/wg0.conf"]

  ssl-proxy:
    build:
      context: ./ssl
      args:
        CARGO_FEATURES: oracle-db
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      vpn-net:
        ipv4_address: 172.28.1.2
    ports:
      - "3000:3000"
      - "3001:3001"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.wg0.rp_filter=0
      - net.core.rmem_max=212992
      - net.core.wmem_max=212992
    volumes:
      - ./ssl/config:/config
      - ./ssl/wallet:/app/wallet
    environment:
      - WG_CONFIG_PATH=/config/wg_confs/wg0.conf
      - WG_SUDO=1
      - RUST_LOG=ssl_proxy=info
      - TNS_ADMIN=/app/wallet
      - ORACLE_CONN=mainerc_tp
      - ORACLE_USER=USCIS_APP
      - ORACLE_PASS_FILE=/run/secrets/oracle_password
      - LD_LIBRARY_PATH=/app/lib
      - BORINGTUN_ENDPOINT=172.28.1.1:443
    secrets:
      - oracle_password
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health && wg show wg0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - boringtun
      - coredns

  coredns:
    image: coredns/coredns:1.11.1
    restart: unless-stopped
    networks:
      vpn-net:
        ipv4_address: 172.28.1.3
    volumes:
      - ./ssl/config/coredns:/etc/coredns
    command: ["-conf", "/etc/coredns/Corefile"]
    expose:
      - "53"
      - "53/udp"

secrets:
  oracle_password:
    file: ./ssl/secrets/oracle_password.txt