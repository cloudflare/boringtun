services:
  ssl-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_FEATURES: oracle-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health && wg show wg0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # NET_ADMIN and /dev/net/tun are required for WireGuard to create tun interfaces
    # and manage routes. Risk: container compromise grants network admin. Mitigations:
    # non-root user (proxyuser), capabilities limited to NET_ADMIN only, no --privileged.
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./lib:/app/lib
      - ./config:/config
      - ./wallet:/app/wallet
    environment:
      - WG_INTERFACE_NAME=wg0
      - WG_TEMPLATE_PATH=/config/templates/server.conf
      - WG_CONFIG_PATH=/run/wireguard/wg0.conf
      - WG_SERVER_ADDRESS=${WG_SERVER_ADDRESS:-10.13.13.1/24}
      - WG_LISTEN_PORT=443
      - WG_MTU=1280
      - WG_WAN_INTERFACE=auto
      - WG_SYSCTL_RETRIES=3
      - WG_SYSCTL_RETRY_DELAY_MS=200
      - WG_RUNTIME_SYSCTLS=0
      - WG_SERVER_PRIVATE_KEY_FILE=/config/server/privatekey-server
      - WG_PEER_CONFIG_PATH=/config/peer1/peer1.conf
      - WG_PEER_PUBLIC_KEY_FILE=/config/peer1/publickey-peer1
      - WG_PEER_ALLOWED_IPS=10.13.13.2/32
      - WG_SUDO=1
      - RUST_LOG=ssl_proxy=info
      - EXPLICIT_PROXY_ENABLED=false
      - TNS_ADMIN=/app/wallet
      - ORACLE_CONN=mainerc_tp
      - ORACLE_USER=USCIS_APP
      - ORACLE_PASS_FILE=/run/secrets/oracle_password
      - LD_LIBRARY_PATH=/app/lib
      - ADMIN_API_KEY=test

    secrets:
      - oracle_password
    ports:
      # Publish the WireGuard UDP listener on the Docker host.
      - "443:443/udp"
      # Keep policy-enforcement and admin surfaces local to the host.
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:3002:3002"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0

secrets:
  oracle_password:
    file: ./secrets/oracle_password.txt
