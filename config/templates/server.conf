[Interface]
Address = __WG_SERVER_ADDRESS__
ListenPort = __WG_LISTEN_PORT__
MTU = __WG_MTU__
PrivateKey = __WG_SERVER_PRIVATE_KEY__
# Allow incoming WireGuard UDP packets on the resolved uplink interface.
PostUp = iptables -A INPUT -i __WG_WAN_INTERFACE__ -p udp --dport __WG_LISTEN_PORT__ -j ACCEPT
# Redirect TCP traffic from TUN interface to ssl-proxy for policy enforcement
PostUp = iptables -t nat -A PREROUTING -i %i -p tcp --dport 443 -j REDIRECT --to-port 3001
PostUp = iptables -t nat -A PREROUTING -i %i -p tcp --dport 80 -j REDIRECT --to-port 3001
# Enable IP forwarding
PostUp = sh -c 'tries=0; max=__WG_SYSCTL_RETRIES__; delay_ms=__WG_SYSCTL_RETRY_DELAY_MS__; while [ "$tries" -lt "$max" ]; do if sysctl -w net.ipv4.ip_forward=1; then exit 0; fi; tries=$((tries+1)); [ "$tries" -lt "$max" ] && sleep 0.$((delay_ms)); done; echo "[wg-quick] warning: unable to set net.ipv4.ip_forward=1 after $max attempts; continuing" >&2; exit 0'
PostUp = sh -c 'tries=0; max=__WG_SYSCTL_RETRIES__; delay_ms=__WG_SYSCTL_RETRY_DELAY_MS__; while [ "$tries" -lt "$max" ]; do if sysctl -w net.ipv6.conf.all.forwarding=1; then exit 0; fi; tries=$((tries+1)); [ "$tries" -lt "$max" ] && sleep 0.$((delay_ms)); done; echo "[wg-quick] warning: unable to set net.ipv6.conf.all.forwarding=1 after $max attempts; continuing" >&2; exit 0'

# Disable reverse path filtering (required for proper routing)
PostUp = sh -c 'tries=0; max=__WG_SYSCTL_RETRIES__; delay_ms=__WG_SYSCTL_RETRY_DELAY_MS__; while [ "$tries" -lt "$max" ]; do if sysctl -w net.ipv4.conf.all.rp_filter=0; then exit 0; fi; tries=$((tries+1)); [ "$tries" -lt "$max" ] && sleep 0.$((delay_ms)); done; echo "[wg-quick] warning: unable to set net.ipv4.conf.all.rp_filter=0 after $max attempts; continuing" >&2; exit 0'
PostUp = sh -c 'tries=0; max=__WG_SYSCTL_RETRIES__; delay_ms=__WG_SYSCTL_RETRY_DELAY_MS__; while [ "$tries" -lt "$max" ]; do if sysctl -w net.ipv4.conf.default.rp_filter=0; then exit 0; fi; tries=$((tries+1)); [ "$tries" -lt "$max" ] && sleep 0.$((delay_ms)); done; echo "[wg-quick] warning: unable to set net.ipv4.conf.default.rp_filter=0 after $max attempts; continuing" >&2; exit 0'
PostUp = sh -c 'tries=0; max=__WG_SYSCTL_RETRIES__; delay_ms=__WG_SYSCTL_RETRY_DELAY_MS__; while [ "$tries" -lt "$max" ]; do if sysctl -w net.ipv4.conf.%i.rp_filter=0; then exit 0; fi; tries=$((tries+1)); [ "$tries" -lt "$max" ] && sleep 0.$((delay_ms)); done; echo "[wg-quick] warning: unable to set net.ipv4.conf.%i.rp_filter=0 after $max attempts; continuing" >&2; exit 0'

# MASQUERADE outgoing traffic
PostUp = iptables -t nat -A POSTROUTING -o __WG_WAN_INTERFACE__ -j MASQUERADE

# Allow established/related connections (critical for return traffic)
PostUp = iptables -A FORWARD -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
PostUp = iptables -A FORWARD -i %i -j ACCEPT
PostUp = iptables -A FORWARD -o %i -j ACCEPT

# TCP MSS clamping - FIX FOR IOS CLIENTS
# This fixes the "handshake works but no traffic" bug by ensuring maximum segment size is properly negotiated
PostUp = iptables -t mangle -A FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PostUp = iptables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
# Optional: Policy-based routing for multi-path egress (uncomment if needed)
# PostUp = iptables -t mangle -A PREROUTING -i %i -j MARK --set-mark 0x100
# PostUp = ip rule add fwmark 0x100 table 100
# PostUp = ip route add default via <secondary_gateway> table 100
# Decision: Keep iptables for now (widely supported, stable). Nftables migration can be future enhancement.
PostDown = iptables -D INPUT -i __WG_WAN_INTERFACE__ -p udp --dport __WG_LISTEN_PORT__ -j ACCEPT
PostDown = iptables -t nat -D PREROUTING -i %i -p tcp --dport 443 -j REDIRECT --to-port 3001
PostDown = iptables -t nat -D PREROUTING -i %i -p tcp --dport 80 -j REDIRECT --to-port 3001
PostDown = iptables -t mangle -D POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PostDown = iptables -t mangle -D FORWARD -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu
PostDown = iptables -D FORWARD -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
PostDown = iptables -D FORWARD -i %i -j ACCEPT
PostDown = iptables -D FORWARD -o %i -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o __WG_WAN_INTERFACE__ -j MASQUERADE
# Optional PostDown for multi-path routing
# PostDown = ip rule del fwmark 0x100 table 100
# PostDown = ip route del default via <secondary_gateway> table 100

[Peer]
PublicKey = __WG_PEER_PUBLIC_KEY__
PresharedKey = __WG_PEER_PRESHARED_KEY__
AllowedIPs = __WG_PEER_ALLOWED_IPS__
