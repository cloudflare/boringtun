name: Docker Tests

on:
  push:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'docker-compose.yaml'
      - 'docker/**'
      - '.github/workflows/ssl-docker.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'docker-compose.yaml'
      - 'docker/**'
      - '.github/workflows/ssl-docker.yml'

jobs:
  test:
    name: Docker Container Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: docker compose build

      - name: Run smoke test
        run: ./tests/smoke.sh
